version: 2
updates:
  # Third-party actions pinned by SHA in the workflows AND in every composite
  # action.yml. Glob directories so a nested capability action is covered.
  - package-ecosystem: github-actions
    directories:
      - /
      - /actions/*
      - /actions/capabilities/*
    schedule:
      interval: weekly
    labels: [dependencies]
    # Let a brand-new release sit a week before adopting it — a compromised
    # third-party action gets scrutiny before it reaches a build.
    cooldown:
      default-days: 7
    # One reviewable PR per scan, not one per directory — the same
    # actions/cache bump otherwise lands as four separate PRs.
    groups:
      actions:
        patterns: ["*"]

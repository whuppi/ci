# Reusable consumer upgrade radar — the things a consuming repo owns that
# Dependabot can't bump, each in its own reviewed PR:
#   flutter-sdk    — the Flutter SDK pin (.fvmrc + example/.fvmrc) → latest stable.
#   lockfiles      — pubspec.lock files refreshed to latest in-range.
#   whuppi-ci-refs — every `whuppi/ci/...@vX.Y.Z` ref across .github (workflows
#                    AND vendored composite action.yml) → the latest whuppi/ci
#                    release, in one sweep. Dependabot never touches refs inside
#                    composite actions (dependabot/dependabot-core#6704), so a
#                    grouped bump splits the pin and the pin-availability gate
#                    rejects it — this keeps every ref on one version.
# The shared tool/binary pins (fvm, Chrome, bore, zizmor, actionlint) that
# whuppi/ci bakes into its actions reach this repo the same way — through the
# whuppi/ci ref bump above; whuppi/ci owns their versions via self-upgrade.yml.
name: Upgrade Check

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: false
        default: 'ubuntu-24.04'
      branch:
        type: string
        required: false
        default: 'dev'

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  # ── Flutter SDK (.fvmrc + example/.fvmrc) ────────────────────────
  flutter-sdk:
    name: Flutter SDK
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: write       # pushes the chore/flutter-sdk branch
      pull-requests: write  # opens / edits the SDK PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          # Own label, distinct from any consumer-local `upgrade-pins` job —
          # existing-PR detection is label-keyed, so shared and local upgrade
          # PRs must never share a label.
          gh label create upgrade-sdk --description "Flutter SDK bump, review the change (auto)" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-sdk --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/flutter-sdk 2>/dev/null || true
            git checkout -B chore/flutter-sdk origin/chore/flutter-sdk 2>/dev/null || git checkout -b chore/flutter-sdk
          else
            git checkout -b chore/flutter-sdk
          fi

      - name: Bump the Flutter SDK pin
        run: |
          set -euo pipefail
          cur="$(jq -r '.flutter // empty' .fvmrc)"
          releases="$(curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json 2>/dev/null || true)"
          stable_hash="$(jq -r '.current_release.stable // empty' <<< "$releases" 2>/dev/null || true)"
          latest="$(jq -r --arg h "$stable_hash" '.releases[] | select(.hash == $h) | .version // empty' <<< "$releases" 2>/dev/null | head -1 || true)"
          # latest is interpolated into the sed below. Keep the exact-semver gate
          # or a crafted upstream value becomes sed injection.
          if [ -n "$latest" ] && ! printf '%s' "$latest" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::implausible flutter version from upstream: '$latest'" >&2
            exit 1
          fi
          if [ -z "$latest" ] || [ -z "$cur" ] || [ "$cur" = "$latest" ]; then
            echo "Flutter SDK already current ($cur)."
            exit 0
          fi
          echo "flutter: $cur -> $latest"
          for f in .fvmrc example/.fvmrc; do
            [ -f "$f" ] || continue
            sed -i.bak "s/\"flutter\": *\"[^\"]*\"/\"flutter\": \"$latest\"/" "$f" && rm -f "$f.bak"
          done

      - name: Commit + open or update the SDK PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
        run: |
          git add ':(glob)**/.fvmrc'
          git commit -m "chore: bump Flutter SDK" || {
            echo "SDK already fresh — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/flutter-sdk
          else
            git push --force origin chore/flutter-sdk
          fi

          PR_BODY="$(cat <<'EOF'
          Flutter SDK bump to the latest stable (`.fvmrc` + `example/.fvmrc`).

          Add `ready-to-test` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/flutter-sdk \
              --title "chore: bump Flutter SDK" --label upgrade-sdk --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "chore: bump Flutter SDK" --body "$PR_BODY"
          fi

  # ── Lockfiles ────────────────────────────────────────────────────
  lockfiles:
    name: Lockfile refresh
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: write       # pushes the chore/lockfiles branch
      pull-requests: write  # opens / edits the lockfiles PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Prepare lockfiles branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          gh label create upgrade-locks --description "Auto: lockfile refresh" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-locks --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/lockfiles 2>/dev/null || true
            git checkout -B chore/lockfiles origin/chore/lockfiles 2>/dev/null || git checkout -b chore/lockfiles
          else
            git checkout -b chore/lockfiles
          fi

      # Resolve against the SDK pinned on current branch — what a fresh consumer builds on.
      - uses: whuppi/ci/actions/capabilities/fvm@main

      - name: Refresh lockfiles to latest in-range
        run: |
          # Root is a pure-Dart package: --no-example so `dart pub` does not try
          # to resolve the Flutter example (it has no sky_engine, dart can't).
          # The example is a Flutter app, so refresh it with `flutter pub`.
          fvm dart pub upgrade --no-example
          ( cd example && fvm flutter pub upgrade )

      - name: Commit + open or update the lockfiles PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
        run: |
          # Glob so a new subpackage lockfile is staged automatically. :(glob) is
          # required — a bare **/pubspec.lock skips the repo-root file (its
          # leading **/ needs a slash), which is the main lockfile.
          git add ':(glob)**/pubspec.lock'
          # List exactly the lockfiles that moved (often only the root resolves),
          # so the body never names a file that did not change. The backtick is
          # built via printf: a literal one command-substitutes in the
          # double-quoted sed, and single-quoting it trips shellcheck SC2016.
          bt=$(printf '\140')
          LOCK_LIST=$(git diff --cached --name-only -- ':(glob)**/pubspec.lock' \
            | sed "s/.*/- ${bt}&${bt}/")
          git commit -m "chore: refresh lockfiles" || {
            echo "Lockfiles already fresh — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/lockfiles
          else
            git push --force origin chore/lockfiles
          fi

          PR_BODY="$(cat <<EOF
          Routine lockfile refresh to the latest in-range (what a fresh consumer resolves):

          $LOCK_LIST

          Add \`ready-to-test\` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/lockfiles \
              --title "chore: refresh lockfiles" --label upgrade-locks --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "chore: refresh lockfiles" --body "$PR_BODY"
          fi

  # ── whuppi/ci refs (workflows + vendored composite actions) ──────
  # Dependabot can't bump whuppi/ci refs that live inside composite action.yml
  # files (dependabot/dependabot-core#6704), so a grouped bump moves only the
  # workflow-level refs and splits the pin — which pin-availability then rejects.
  # This sweeps EVERY versioned whuppi/ci ref, workflow and composite alike, to
  # the latest release in one PR. Consumers drop whuppi/ci from their Dependabot
  # group; this owns it instead.
  whuppi-ci-refs:
    name: whuppi/ci refs
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: write       # pushes the chore/whuppi-ci-refs branch
      pull-requests: write  # opens / edits the PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          gh label create upgrade-ci-refs --description "Auto: whuppi/ci ref bump" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-ci-refs --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/whuppi-ci-refs 2>/dev/null || true
            git checkout -B chore/whuppi-ci-refs origin/chore/whuppi-ci-refs 2>/dev/null || git checkout -b chore/whuppi-ci-refs
          else
            git checkout -b chore/whuppi-ci-refs
          fi

      - name: Sweep every whuppi/ci ref to the latest release
        id: sweep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest="$(gh api repos/whuppi/ci/releases/latest --jq '.tag_name' 2>/dev/null || true)"
          # latest is interpolated into the sed below — reject anything but an
          # exact vX.Y.Z tag, or a crafted release name becomes sed injection.
          if ! printf '%s' "$latest" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::implausible whuppi/ci release tag: '$latest'" >&2
            exit 1
          fi
          # Every .github file pinning a whuppi/ci ref to a version tag —
          # workflows AND composite action.yml. `@main` refs (intentionally
          # floating) carry no @v and are left untouched.
          # Fill the array the bash-3.2-portable way (macOS ships that bash).
          files=()
          while IFS= read -r f; do files+=("$f"); done \
            < <(grep -rlE 'whuppi/ci/[^@[:space:]]*@v[0-9.]+' .github || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No versioned whuppi/ci refs found — nothing to sweep."
            exit 0
          fi
          for f in "${files[@]}"; do
            sed -i.bak -E "s#(whuppi/ci/[^@[:space:]]*)@v[0-9.]+#\1@${latest}#g" "$f"
            rm -f "$f.bak"
          done
          # Hand the exact rewritten paths to the commit step so it stages only
          # those, matching the sibling jobs' targeted add (never a blanket add).
          {
            echo "files<<SWEPT_EOF"
            printf '%s\n' "${files[@]}"
            echo "SWEPT_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "swept ${#files[@]} file(s) → $latest"

      - name: Commit + open or update the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
          SWEPT_FILES: ${{ steps.sweep.outputs.files }}
        run: |
          # Stage only the files the sweep rewrote — never a blanket `git add`.
          printf '%s\n' "$SWEPT_FILES" | while IFS= read -r f; do
            [ -n "$f" ] && git add -- "$f"
          done
          git commit -m "ci: bump whuppi/ci refs to latest" || {
            echo "whuppi/ci refs already current — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/whuppi-ci-refs
          else
            git push --force origin chore/whuppi-ci-refs
          fi

          PR_BODY="$(cat <<'EOF'
          Bumps every `whuppi/ci/...@vX.Y.Z` reference across `.github` — workflows
          AND vendored composite actions — to the latest whuppi/ci release, in one
          sweep, so the pin stays uniform. Dependabot can't do this: it never
          touches refs inside composite `action.yml` (dependabot/dependabot-core#6704),
          so its grouped bump splits the pin and pin-availability rejects it.

          Add `ready-to-test` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/whuppi-ci-refs \
              --title "ci: bump whuppi/ci refs to latest" --label upgrade-ci-refs --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "ci: bump whuppi/ci refs to latest" --body "$PR_BODY"
          fi

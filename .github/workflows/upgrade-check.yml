# Reusable consumer upgrade radar — things a consuming repo owns that its
# updater doesn't cover here, each in its own reviewed PR:
#   flutter-sdk  — the Flutter SDK pin (.fvmrc + example/.fvmrc) → latest stable.
#   lockfiles    — pubspec.lock files refreshed to latest in-range.
#   action-refs  — ONE owner for EVERY `uses:` action ref (opt-in): whuppi/ci
#                  refs across .github (workflows AND composites) → latest
#                  release, kept uniform so the pin never splits; and every
#                  third-party action (workflows AND composites alike) → latest
#                  SHA via pinact.
#
# Why one owner: Dependabot never reads `uses:` inside composite action.yml
# (dependabot-core#6704), so splitting action updates between Dependabot
# (workflows) and a sweep (composites) is the ugly half-and-half we refuse. The
# action-refs job owns ALL action refs — workflow and composite, whuppi/ci and
# third-party — in one PR. Dependabot is left owning ONLY pub deps (its one
# competency nothing else here covers). A consumer opts in with
# `sweepActions: true` + CI_ACTIONS_TOKEN (a Workflows-scope PAT — GITHUB_TOKEN
# can't write .github/workflows/) and drops the whole `github-actions` ecosystem
# from its Dependabot config.
#
# The shared tool/binary pins (fvm, Chrome, bore, zizmor, actionlint, pinact)
# reach consumers through a whuppi/ci release + the action-refs whuppi/ci bump;
# whuppi/ci owns their versions via self-upgrade.yml.
name: Upgrade Check

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: false
        default: 'ubuntu-24.04'
      branch:
        type: string
        required: false
        default: 'dev'
      sweepActions:
        # Opt in to the action-refs job. Off by default so a consumer that
        # hasn't set up CI_ACTIONS_TOKEN keeps its old Dependabot-only shape.
        type: boolean
        required: false
        default: false
    secrets:
      CI_ACTIONS_TOKEN:
        # Workflows-scope PAT for the action-refs job's push (GITHUB_TOKEN
        # can't write .github/workflows/). Only needed when sweepActions: true.
        required: false

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  # ── Flutter SDK (.fvmrc + example/.fvmrc) ────────────────────────
  flutter-sdk:
    name: Flutter SDK
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: write       # pushes the chore/flutter-sdk branch
      pull-requests: write  # opens / edits the SDK PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          # Own label, distinct from any consumer-local `upgrade-pins` job —
          # existing-PR detection is label-keyed, so shared and local upgrade
          # PRs must never share a label.
          gh label create upgrade-sdk --description "Flutter SDK bump, review the change (auto)" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-sdk --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/flutter-sdk 2>/dev/null || true
            git checkout -B chore/flutter-sdk origin/chore/flutter-sdk 2>/dev/null || git checkout -b chore/flutter-sdk
          else
            git checkout -b chore/flutter-sdk
          fi

      - name: Bump the Flutter SDK pin
        run: |
          set -euo pipefail
          cur="$(jq -r '.flutter // empty' .fvmrc)"
          releases="$(curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json 2>/dev/null || true)"
          stable_hash="$(jq -r '.current_release.stable // empty' <<< "$releases" 2>/dev/null || true)"
          latest="$(jq -r --arg h "$stable_hash" '.releases[] | select(.hash == $h) | .version // empty' <<< "$releases" 2>/dev/null | head -1 || true)"
          # latest is interpolated into the sed below. Keep the exact-semver gate
          # or a crafted upstream value becomes sed injection.
          if [ -n "$latest" ] && ! printf '%s' "$latest" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::implausible flutter version from upstream: '$latest'" >&2
            exit 1
          fi
          if [ -z "$latest" ] || [ -z "$cur" ] || [ "$cur" = "$latest" ]; then
            echo "Flutter SDK already current ($cur)."
            exit 0
          fi
          echo "flutter: $cur -> $latest"
          for f in .fvmrc example/.fvmrc; do
            [ -f "$f" ] || continue
            sed -i.bak "s/\"flutter\": *\"[^\"]*\"/\"flutter\": \"$latest\"/" "$f" && rm -f "$f.bak"
          done

      - name: Commit + open or update the SDK PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
        run: |
          git add ':(glob)**/.fvmrc'
          git commit -m "chore: bump Flutter SDK" || {
            echo "SDK already fresh — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/flutter-sdk
          else
            git push --force origin chore/flutter-sdk
          fi

          PR_BODY="$(cat <<'EOF'
          Flutter SDK bump to the latest stable (`.fvmrc` + `example/.fvmrc`).

          Add `ready-to-test` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/flutter-sdk \
              --title "chore: bump Flutter SDK" --label upgrade-sdk --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "chore: bump Flutter SDK" --body "$PR_BODY"
          fi

  # ── Lockfiles ────────────────────────────────────────────────────
  lockfiles:
    name: Lockfile refresh
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: write       # pushes the chore/lockfiles branch
      pull-requests: write  # opens / edits the lockfiles PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Prepare lockfiles branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          gh label create upgrade-locks --description "Auto: lockfile refresh" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-locks --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/lockfiles 2>/dev/null || true
            git checkout -B chore/lockfiles origin/chore/lockfiles 2>/dev/null || git checkout -b chore/lockfiles
          else
            git checkout -b chore/lockfiles
          fi

      # Resolve against the SDK pinned on current branch — what a fresh consumer builds on.
      - uses: whuppi/ci/actions/capabilities/fvm@main

      - name: Refresh lockfiles to latest in-range
        run: |
          # Root is a pure-Dart package: --no-example so `dart pub` does not try
          # to resolve the Flutter example (it has no sky_engine, dart can't).
          # The example is a Flutter app, so refresh it with `flutter pub`.
          fvm dart pub upgrade --no-example
          ( cd example && fvm flutter pub upgrade )

      - name: Commit + open or update the lockfiles PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
        run: |
          # Glob so a new subpackage lockfile is staged automatically. :(glob) is
          # required — a bare **/pubspec.lock skips the repo-root file (its
          # leading **/ needs a slash), which is the main lockfile.
          git add ':(glob)**/pubspec.lock'
          # List exactly the lockfiles that moved (often only the root resolves),
          # so the body never names a file that did not change. The backtick is
          # built via printf: a literal one command-substitutes in the
          # double-quoted sed, and single-quoting it trips shellcheck SC2016.
          bt=$(printf '\140')
          LOCK_LIST=$(git diff --cached --name-only -- ':(glob)**/pubspec.lock' \
            | sed "s/.*/- ${bt}&${bt}/")
          git commit -m "chore: refresh lockfiles" || {
            echo "Lockfiles already fresh — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/lockfiles
          else
            git push --force origin chore/lockfiles
          fi

          PR_BODY="$(cat <<EOF
          Routine lockfile refresh to the latest in-range (what a fresh consumer resolves):

          $LOCK_LIST

          Add \`ready-to-test\` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/lockfiles \
              --title "chore: refresh lockfiles" --label upgrade-locks --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "chore: refresh lockfiles" --body "$PR_BODY"
          fi

  # ── Action refs — ONE owner for every `uses:` ref (the #6704 fix) ──
  # Opt-in (sweepActions: true). Bumps EVERY action ref in .github, workflow and
  # composite alike, in one PR — no split between Dependabot and a sweep:
  #   1. every whuppi/ci ref (workflows AND composite action.yml) → latest
  #      release, swept uniform so the pin never splits;
  #   2. every third-party action (workflows AND composites) → latest SHA, via
  #      pinact (which reads composite action.yml, the dependabot-core#6704 blind
  #      spot).
  # This leaves Dependabot owning ONLY pub deps. The push needs CI_ACTIONS_TOKEN
  # (Workflows-scope PAT) — GITHUB_TOKEN can't write .github/workflows/.
  # github.token (contents:read) still authenticates pinact's SHA-resolving reads.
  action-refs:
    name: Action refs
    if: ${{ inputs.sweepActions }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read   # pinact's GitHub API reads; the PAT does every write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false
      # whuppi/ci itself — for tool/versions.env (PINACT_VERSION). Stamped to
      # the release tag by self-release.yml, same as the pr-checks gate does.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main
          path: .whuppi-ci
          persist-credentials: false

      - name: Prepare branch
        id: branch
        env:
          # The PAT, not GITHUB_TOKEN: `gh auth setup-git` wires it into git's
          # credential helper so the push can write .github/workflows/.
          GH_TOKEN: ${{ secrets.CI_ACTIONS_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::sweepActions is on but CI_ACTIONS_TOKEN was not passed. Add it under the caller's secrets:." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          gh label create upgrade-action-refs --description "Auto: every action uses: ref bump (workflows + composites)" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-action-refs --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/action-refs 2>/dev/null || true
            git checkout -B chore/action-refs origin/chore/action-refs 2>/dev/null || git checkout -b chore/action-refs
          else
            git checkout -b chore/action-refs
          fi

      - name: Sweep every whuppi/ci ref to the latest release
        id: sweep
        env:
          GH_TOKEN: ${{ secrets.CI_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          latest="$(gh api repos/whuppi/ci/releases/latest --jq '.tag_name' 2>/dev/null || true)"
          # latest is interpolated into the sed below — reject anything but an
          # exact vX.Y.Z tag, or a crafted release name becomes sed injection.
          if ! printf '%s' "$latest" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::implausible whuppi/ci release tag: '$latest'" >&2
            exit 1
          fi
          # Every .github file pinning a whuppi/ci ref to a version tag —
          # workflows AND composite action.yml. `@main` refs (intentionally
          # floating) carry no @v and are left untouched. .whuppi-ci is our own
          # transient checkout of whuppi/ci — never sweep or stage it.
          files=()
          while IFS= read -r f; do files+=("$f"); done \
            < <(grep -rlE 'whuppi/ci/[^@[:space:]]*@v[0-9.]+' .github || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No versioned whuppi/ci refs found — nothing to sweep."
          else
            for f in "${files[@]}"; do
              sed -i.bak -E "s#(whuppi/ci/[^@[:space:]]*)@v[0-9.]+#\1@${latest}#g" "$f"
              rm -f "$f.bak"
            done
            echo "swept ${#files[@]} whuppi/ci ref file(s) → $latest"
          fi
          # Hand the exact rewritten paths to the commit step so it stages only
          # those (never a blanket add).
          {
            echo "files<<SWEPT_EOF"
            printf '%s\n' "${files[@]}"
            echo "SWEPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pin every third-party action to the latest SHA (pinact)
        id: pinact
        env:
          # Read-only API for resolving tag → SHA. The write is the push below.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source .whuppi-ci/tool/versions.env
          go install "github.com/suzuki-shunsuke/pinact/v4/cmd/pinact@v$PINACT_VERSION"
          PATH="$(go env GOPATH)/bin:$PATH"
          # ALL action files — workflows AND composite action.yml. One owner for
          # every third-party ref, no split with Dependabot (which is left owning
          # only pub). whuppi/ci refs are excluded — the sweep above keeps them as
          # version tags, not SHAs.
          targets=()
          while IFS= read -r f; do targets+=("$f"); done \
            < <(find .github/workflows .github/actions \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null || true)
          if [ ${#targets[@]} -eq 0 ]; then
            echo "No workflow/composite files — nothing to pin."
          else
            pinact run --update --exclude '^whuppi/ci/' "${targets[@]}"
          fi
          # Stage any file pinact rewrote (workflows or composites).
          changed=()
          while IFS= read -r f; do changed+=("$f"); done \
            < <(git diff --name-only -- '.github/workflows' '.github/actions' 2>/dev/null || true)
          {
            echo "files<<PINNED_EOF"
            printf '%s\n' "${changed[@]}"
            echo "PINNED_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit + open or update the PR
        env:
          GH_TOKEN: ${{ secrets.CI_ACTIONS_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
          BASE: ${{ inputs.branch }}
          SWEPT_FILES: ${{ steps.sweep.outputs.files }}
          PINNED_FILES: ${{ steps.pinact.outputs.files }}
        run: |
          # Stage only the files the two steps rewrote — never a blanket add,
          # and never .whuppi-ci (our transient whuppi/ci checkout).
          printf '%s\n%s\n' "$SWEPT_FILES" "$PINNED_FILES" | while IFS= read -r f; do
            [ -n "$f" ] && git add -- "$f"
          done
          git commit -m "ci: bump all action refs (workflows + composites)" || {
            echo "Refs already current — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/action-refs
          else
            git push --force origin chore/action-refs
          fi

          PR_BODY="$(cat <<'EOF'
          One owner for every `uses:` action ref in `.github` — workflow and
          composite alike, no split with Dependabot:

          - **whuppi/ci refs** across `.github` (workflows AND composite
            `action.yml`) swept uniform to the latest whuppi/ci release, so the
            pin never splits.
          - **Every third-party action** (workflows AND composites) pinned to the
            latest SHA via pinact — including the refs inside composite
            `action.yml` that Dependabot can't read (dependabot-core#6704).

          Dependabot owns pub deps only.

          Add `ready-to-test` for the full cross-target run, then merge once green.

          _Auto-generated by upgrade-check.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base "$BASE" --head chore/action-refs \
              --title "ci: bump all action refs (workflows + composites)" --label upgrade-action-refs --draft --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" --title "ci: bump all action refs (workflows + composites)" --body "$PR_BODY"
          fi

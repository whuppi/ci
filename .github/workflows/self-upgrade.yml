# Daily pin radar for whuppi/ci's own supply chain — the tool/binary pins in
# tool/versions.env that Dependabot can't see (fvm, Chrome+driver, bore, zizmor,
# actionlint), with recomputed sha256s. Opens ONE reviewed PR against main.
# Merging it and cutting a whuppi/ci release is what carries the bump to every
# consumer (through their grouped Dependabot PR).
name: Self Upgrade

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 8am UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  pins:
    name: Pinned versions
    if: github.repository_owner == 'whuppi'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write       # pushes the chore/pins branch
      pull-requests: write  # opens / edits the pins PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      # Tamper check FIRST: re-hash the already-pinned assets. A hash that moved
      # while its version did NOT is an upstream repoint — fail, never bump.
      - name: Verify pinned assets unchanged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tool/ci/upgrade.sh verify-pinned

      - name: Prepare pins branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          gh label create upgrade-pins --description "Auto: pinned tool/binary bump (review the hashes)" --color "1d76db" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --label upgrade-pins --state open --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin chore/pins 2>/dev/null || true
            git checkout -B chore/pins origin/chore/pins 2>/dev/null || git checkout -b chore/pins
          else
            git checkout -b chore/pins
          fi

      - name: Bump pinned versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tool/ci/upgrade.sh apply

      - name: Commit + open or update the pins PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_PR: ${{ steps.branch.outputs.existing_pr }}
        run: |
          git add tool/versions.env
          git commit -m "chore: bump pinned versions" || {
            echo "Pins already fresh — nothing to bump."
            exit 0
          }
          if [ -n "$EXISTING_PR" ]; then
            git push origin chore/pins
          else
            # Any remote copy is debris from a closed PR. Plain --force, not
            # --force-with-lease: only the bot pushes this branch, and lease
            # fails when there's no remote-tracking ref (fresh or post-merge).
            git push --force origin chore/pins
          fi

          PR_BODY="$(cat <<'EOF'
          Supply-chain pin bump — review the recomputed hashes in the diff:

          - **tools + binaries + the zizmor + actionlint gate pins**
            (`tool/versions.env`) — sha256s recomputed from the upstream release
            assets, re-verified by `fetch_verified` on every build.

          These pins are consumed by every whuppi/ci consumer. The already-pinned
          assets were re-hashed before this bump (repoint alarm). Merge once
          self-check is green; cut a whuppi/ci release so consumers pick the bump
          up through their grouped Dependabot PR.

          _Auto-generated by self-upgrade.yml_
          EOF
          )"

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base main \
              --head chore/pins \
              --title "chore: bump pinned versions" \
              --label upgrade-pins \
              --draft \
              --body "$PR_BODY"
          else
            gh pr edit "$EXISTING_PR" \
              --title "chore: bump pinned versions" \
              --body "$PR_BODY"
          fi

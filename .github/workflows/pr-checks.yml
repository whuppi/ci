# Reusable PR quality gates. Callers own the triggers + concurrency; this file
# owns the jobs. Jobs: conventional-commit title, promotion chain, changelog
# versions (both lanes), and workflow lint (zizmor security + actionlint
# correctness + shell portability) over the CONSUMER's .github tree.
#
# The consumer's own tool/commit-types.txt wins if present; otherwise the
# shared list in whuppi/ci is the fallback. Scripts run from the consumer root
# (release.sh + lint_shell.sh both key off the current directory).
name: PR Checks

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: false
        default: 'ubuntu-24.04'
      changelog-check:
        type: boolean
        required: false
        default: true
      shell-lint:
        type: boolean
        required: false
        default: true

permissions: {}

jobs:
  # ── Conventional Commits ─────────────────────────────────────────
  conventional-commit:
    name: Conventional Commit
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read  # checkout only; reads the commit-types list
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: v1.0.6
          path: .whuppi-ci
          persist-credentials: false
      - name: Check PR title
        shell: bash
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # A consumer override wins; the shared list is the fallback.
          types_file=tool/commit-types.txt
          [ -f "$types_file" ] || types_file=.whuppi-ci/tool/commit-types.txt
          types=$(paste -sd'|' "$types_file")
          if ! grep -qE "^(${types})(\(.+\))?!?: .+" <<< "$TITLE"; then
            echo "::error::PR title must follow Conventional Commits format."
            echo ""
            echo "  <type>[optional scope]: <description>"
            echo ""
            printf '  Types: %s\n' "$(paste -sd' ' "$types_file")"
            echo "  Examples:"
            echo "    feat: add share sheet support"
            echo "    fix(web): handle empty input edge case"
            echo "    feat!: redesign API (breaking change)"
            echo ""
            echo "  Your title: $TITLE"
            exit 1
          fi
          echo "✓ PR title is valid: $TITLE"

  # ── Promotion Chain ──────────────────────────────────────────────
  promotion-check:
    name: Promotion Chain
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Validate promotion path
        shell: bash
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD → $BASE"
          if [[ "$BASE" == "prod" && "$HEAD" != "dev" && "$HEAD" != hotfix/* ]]; then
            echo "::error::prod only accepts PRs from dev or hotfix/* branches. Got: $HEAD → prod"
            exit 1
          fi
          if [[ "$BASE" == "dev" && "$HEAD" == "prod" ]]; then
            echo "::error::dev does not accept PRs from prod. Got: prod → dev"
            exit 1
          fi
          echo "✓ Valid promotion path: $HEAD → $BASE"

  # ── Changelog Versions ───────────────────────────────────────────
  # Both lanes, every PR — a faulty changelog must never merge into a
  # release branch. Only the TOP heading of each file may be untagged.
  changelog-check:
    name: Changelog Versions
    if: inputs.changelog-check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Prerelease lane (CHANGELOG.pre.md)
        uses: whuppi/ci/actions/release-tool@v1.0.6
        env:
          BRANCH: dev
        with:
          mode: --check-versions
      - name: Stable lane (CHANGELOG.md)
        uses: whuppi/ci/actions/release-tool@v1.0.6
        env:
          BRANCH: prod
        with:
          mode: --check-versions

  # ── Workflow lint (zizmor + actionlint + shell) ──────────────────
  # zizmor = security (auditor persona, zero findings). actionlint =
  # correctness. lint_shell = bash portability. All scan the CONSUMER's tree.
  workflow-lint:
    name: Workflow lint
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read  # checkout only; both tools read the workflow files
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: v1.0.6
          path: .whuppi-ci
          persist-credentials: false
      - name: zizmor (security, auditor persona, zero findings)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}  # higher API rate limit for ref checks
        run: |
          source .whuppi-ci/tool/versions.env
          pipx run "zizmor==$ZIZMOR_VERSION" --persona=auditor .github/
      - name: actionlint (correctness)
        shell: bash
        run: |
          source .whuppi-ci/tool/versions.env
          go install "github.com/rhysd/actionlint/cmd/actionlint@v$ACTIONLINT_VERSION"
          PATH="$(go env GOPATH)/bin:$PATH"
          actionlint -color
      - name: shell lint (shellcheck + bash 3.2 portability)
        if: inputs.shell-lint
        shell: bash
        run: bash .whuppi-ci/tool/lint_shell.sh

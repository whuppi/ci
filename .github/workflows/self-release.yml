# whuppi/ci's own release cut. A GitHub release IS the artifact — no
# compile/upload/publish. All logic lives in tool/ci/self_release.sh, which
# stamps every internal @main ref to the release tag in a detached commit, tags
# that commit, and creates the release. main never carries the stamp.
#
# Cut a release = merge a PR to main whose CHANGELOG.md gains a new top heading.
name: Self Release

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  gate:
    name: Release gate
    if: github.repository_owner == 'whuppi'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Version sanity
        run: bash tool/ci/self_release.sh --check-versions
      - name: Check changelog relevance
        id: check
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash tool/ci/self_release.sh --gate

  release:
    name: Cut release
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write  # self_release.sh --discover tags + creates the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Stamp internal refs, tag, create the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tool/ci/self_release.sh --discover

# Reusable release pipeline for a pure-Dart/Flutter package: gate → discover →
# git-install-note → publish. All release logic lives in
# whuppi/ci/tool/ci/release.sh; this workflow only orchestrates jobs. No
# compile/upload jobs — a package with no shipped binaries skips them (a
# binary-shipping consumer adds its own compile job + --update-tag-hashes).
#
# The caller resolves the lane (dev/prod) and passes it as `branch`, carries
# the trigger (changelog push + dispatch), and provides the pub.dev credential.
# Publish waits on the branch-named GitHub environment approval.
name: Release

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: true
      runner:
        type: string
        required: false
        default: 'ubuntu-24.04'
    secrets:
      pub-credentials:
        required: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  # ── Gate ─────────────────────────────────────────────────────────
  gate:
    name: Release gate
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read  # checkout + changelog gate, read-only
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main   # stamped to the exact release tag by self-release.yml
          path: .whuppi-ci
          persist-credentials: false
      # Backstop: even if a faulty merge skipped the PR check, refuse to
      # release a lane whose changelog adds more than one new version.
      - name: Version sanity
        env:
          BRANCH: ${{ inputs.branch }}
        run: bash .whuppi-ci/tool/ci/release.sh --check-versions
      - name: Check changelog relevance
        id: check
        env:
          BRANCH: ${{ inputs.branch }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash .whuppi-ci/tool/ci/release.sh --gate

  # ── Discover version + create release ────────────────────────────
  discover:
    name: Discover version
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    concurrency:
      group: release-${{ needs.gate.outputs.version || github.run_id }}
      cancel-in-progress: true
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: write  # release.sh --discover creates the GitHub release
    outputs:
      tag: ${{ steps.find.outputs.tag }}
      version: ${{ steps.find.outputs.version }}
      has_release: ${{ steps.find.outputs.has_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          submodules: recursive
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main
          path: .whuppi-ci
          persist-credentials: false
      - name: Find + create release
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ inputs.branch }}
        run: bash .whuppi-ci/tool/ci/release.sh --discover

  # ── Append the git-tag install snippet ───────────────────────────
  git-install-note:
    name: Git install note
    needs: discover
    if: needs.discover.outputs.has_release == 'true'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: write  # edits the release notes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.discover.outputs.tag }}
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main
          path: .whuppi-ci
          persist-credentials: false
      - name: Add git install snippet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.discover.outputs.tag }}
        run: bash .whuppi-ci/tool/ci/release.sh --add-git-install "$TAG"

  # ── Publish to pub.dev ───────────────────────────────────────────
  publish:
    name: Publish to pub.dev
    needs: [discover, git-install-note]
    if: needs.discover.outputs.has_release == 'true'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    environment: ${{ inputs.branch }}
    permissions:
      contents: write  # ephemeral stamp commit + release-notes install snippet
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.discover.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main
          path: .whuppi-ci
          persist-credentials: false
      - uses: whuppi/ci/actions/capabilities/fvm@main
      - name: Build filtered changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.discover.outputs.tag }}
        run: bash .whuppi-ci/tool/ci/release.sh --stamp-changelog "$TAG"
      - name: Flatten README banner for pub.dev
        run: bash .whuppi-ci/tool/ci/release.sh --stamp-readme
      - name: Drop the whuppi/ci checkout before packaging
        # The tarball is built from the working tree; the .whuppi-ci checkout
        # must not enter it. Remove it before the stamp commit so the packaged
        # tree is exactly the consumer's own files.
        run: rm -rf .whuppi-ci
      - name: Ephemeral commit (clean git for pub publish)
        env:
          TAG: ${{ needs.discover.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "stamp: $TAG" --allow-empty
      - name: Materialize pub.dev credentials
        env:
          PUB_CREDS: ${{ secrets.pub-credentials }}
        run: |
          mkdir -p "$HOME/.config/dart"
          printf '%s' "$PUB_CREDS" > "$HOME/.config/dart/pub-credentials.json"
      - run: fvm dart pub get --no-example
      - run: fvm dart pub publish --force
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: whuppi/ci
          ref: main
          path: .whuppi-ci
          persist-credentials: false
      - name: Add pub.dev install snippet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.discover.outputs.tag }}
        run: bash .whuppi-ci/tool/ci/release.sh --add-pub-install "$TAG"

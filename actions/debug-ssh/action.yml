# ────────────────────────────────────────────────────────────────────
# debug-ssh — Non-blocking SSH access to any CI runner.
#
# HOW IT WORKS:
#   Starts sshd + bore tunnel in the background (~10s), then returns.
#   The job continues while SSH stays open. Tunnel dies when the job
#   ends (runner destroyed).
#
# HOW TO USE FOR REAL DEBUGGING:
#   You need TWO things in the calling workflow/action:
#
#   1. This action BEFORE the steps you want to debug (starts tunnel)
#   2. A keep-alive step AFTER the test steps with if: always()
#      (holds the runner open so you can investigate failures)
#
#   Example inside a workflow job:
#
#     steps:
#       - uses: actions/checkout@v7
#       - uses: whuppi/ci/actions/debug-ssh@v1.0.0    # ← tunnel opens
#       - uses: whuppi/ci/actions/make-target@v1.0.0  # ← test runs
#         with: { make-target: test-unit }
#       - name: Keep alive for debugging
#         if: always()
#         shell: bash
#         run: |
#           echo "SSH open. Touch /tmp/stop to end."
#           for i in $(seq 1 1800); do
#             [ -f /tmp/stop ] && break; sleep 10
#           done
#
#   The keep-alive runs even if the test step fails (if: always()).
#   You get up to 5 hours to SSH in, inspect the state, run commands.
#   Touch /tmp/stop from inside the SSH session to release the runner.
#
#   IMPORTANT: increase the job's timeout-minutes to 300 (5 hours)
#   in the workflow, or the job will be killed at the default timeout.
#
# HOW TO CONNECT:
#   Option A — artifact (works even if logs aren't flushed yet):
#     gh run download <RUN_ID> --name ssh-info-<OS> --dir /tmp/ssh-info
#     $(cat /tmp/ssh-info/connect.txt)
#
#   Option B — run Summary tab in the GitHub UI:
#     Look for "SSH Connection" section.
#
#   Option C — annotation in the checks tab:
#     The ::notice:: annotation shows the ssh command.
#
# SECURITY:
#   - Auth: key-only. Keys pulled from the triggering user's GitHub
#     profile (github.actor). Only the person who triggered the
#     workflow can SSH in.
#   - Secrets: GITHUB_TOKEN and runner tokens are stripped from the
#     SSH session's environment. Note: tokens may still be readable
#     from /proc or disk on the runner. Do NOT use on workflows
#     triggered by untrusted PRs from forks.
#   - Runner: ephemeral. Destroyed when the job ends.
#   - Tunnel: encrypted. Port is random.
#
# WHEN TO REMOVE:
#   Remove debug-ssh + keep-alive from composite actions BEFORE
#   merging to dev. Keep the action itself — it's reusable. Just
#   don't leave it embedded in test actions permanently.
#
# RUNNERS: Linux (apt openssh-server), macOS (built-in sshd),
#   Windows (built-in OpenSSH). bore binary auto-selected per OS.
# ────────────────────────────────────────────────────────────────────

name: Debug SSH (bore tunnel)
description: >
  Non-blocking SSH into the runner. See file header for usage.

inputs:
  github-user:
    description: >
      GitHub username whose SSH keys are authorized.
      Defaults to the user who triggered the workflow.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Start SSH tunnel (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        INPUT_USER: ${{ inputs.github-user }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        SSH_USER="${INPUT_USER:-$ACTOR}"
        unset GITHUB_TOKEN ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN

        sudo apt-get update -qq && sudo apt-get install -y -qq openssh-server >/dev/null 2>&1
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        curl -sS "https://github.com/${SSH_USER}.keys" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        sudo mkdir -p /run/sshd
        echo -e "Port 2222\nPasswordAuthentication no\nPubkeyAuthentication yes\nPermitRootLogin no" \
          | sudo tee /etc/ssh/sshd_config.d/debug.conf >/dev/null
        env -u GITHUB_TOKEN -u ACTIONS_RUNTIME_TOKEN -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
          sudo /usr/sbin/sshd -p 2222

        CI_ROOT="$GITHUB_ACTION_PATH/../.."
        source "$CI_ROOT/tool/versions.env"
        bash "$CI_ROOT/tool/fetch_verified.sh" \
          "https://github.com/ekzhang/bore/releases/download/$BORE_VERSION/bore-$BORE_VERSION-x86_64-unknown-linux-musl.tar.gz" \
          "$BORE_SHA256_LINUX_X64" /tmp/bore.tar.gz
        tar xz -C /tmp -f /tmp/bore.tar.gz
        chmod +x /tmp/bore
        nohup /tmp/bore local 2222 --to bore.pub > /tmp/bore.log 2>&1 &
        sleep 5

        BORE_PORT=$(grep -o 'bore\.pub:[0-9]*' /tmp/bore.log | cut -d: -f2 | head -1 || true)
        if [ -z "$BORE_PORT" ]; then
          echo "::warning::bore tunnel failed — continuing without SSH"
          cat /tmp/bore.log; exit 0
        fi

        SSH_CMD="ssh -p $BORE_PORT -o StrictHostKeyChecking=no runner@bore.pub"
        echo "::notice::$SSH_CMD"
        echo "## SSH Connection (Linux)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$SSH_CMD" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        mkdir -p /tmp/ssh-info
        echo "$SSH_CMD" > /tmp/ssh-info/connect.txt
        echo "$BORE_PORT" > /tmp/ssh-info/port.txt

    - name: Start SSH tunnel (macOS)
      if: runner.os == 'macOS'
      shell: bash
      env:
        INPUT_USER: ${{ inputs.github-user }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        SSH_USER="${INPUT_USER:-$ACTOR}"
        unset GITHUB_TOKEN ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN

        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        curl -sS "https://github.com/${SSH_USER}.keys" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        sudo systemsetup -setremotelogin on 2>/dev/null || true
        sudo /usr/sbin/sshd -p 2222 2>/dev/null || true

        CI_ROOT="$GITHUB_ACTION_PATH/../.."
        source "$CI_ROOT/tool/versions.env"
        bash "$CI_ROOT/tool/fetch_verified.sh" \
          "https://github.com/ekzhang/bore/releases/download/$BORE_VERSION/bore-$BORE_VERSION-aarch64-apple-darwin.tar.gz" \
          "$BORE_SHA256_MACOS_ARM64" /tmp/bore.tar.gz
        tar xz -C /tmp -f /tmp/bore.tar.gz
        chmod +x /tmp/bore
        nohup /tmp/bore local 2222 --to bore.pub > /tmp/bore.log 2>&1 &
        sleep 5

        BORE_PORT=$(grep -o 'bore\.pub:[0-9]*' /tmp/bore.log | cut -d: -f2 | head -1 || true)
        if [ -z "$BORE_PORT" ]; then
          echo "::warning::bore tunnel failed — continuing without SSH"
          cat /tmp/bore.log; exit 0
        fi

        SSH_CMD="ssh -p $BORE_PORT -o StrictHostKeyChecking=no runner@bore.pub"
        echo "::notice::$SSH_CMD"
        echo "## SSH Connection (macOS)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$SSH_CMD" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        mkdir -p /tmp/ssh-info
        echo "$SSH_CMD" > /tmp/ssh-info/connect.txt
        echo "$BORE_PORT" > /tmp/ssh-info/port.txt

    - name: Start SSH tunnel (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        INPUT_USER: ${{ inputs.github-user }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        SSH_USER="${INPUT_USER:-$ACTOR}"
        unset GITHUB_TOKEN ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN

        # Windows OpenSSH: admin users read keys from ProgramData, not ~/.ssh
        KEYS=$(curl -sS "https://github.com/${SSH_USER}.keys")
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        echo "$KEYS" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        # Admin keys file — Windows sshd ignores ~/.ssh for admin accounts
        echo "$KEYS" | powershell -Command '
          $input | Set-Content C:\ProgramData\ssh\administrators_authorized_keys
          icacls C:\ProgramData\ssh\administrators_authorized_keys /inheritance:r /grant "SYSTEM:(R)" /grant "BUILTIN\Administrators:(R)"
        '
        powershell -Command "Start-Service sshd" 2>/dev/null || \
          powershell -Command "Add-WindowsCapability -Online -Name OpenSSH.Server; Start-Service sshd" 2>/dev/null || true

        CI_ROOT="$GITHUB_ACTION_PATH/../.."
        source "$CI_ROOT/tool/versions.env"
        bash "$CI_ROOT/tool/fetch_verified.sh" \
          "https://github.com/ekzhang/bore/releases/download/$BORE_VERSION/bore-$BORE_VERSION-x86_64-pc-windows-msvc.zip" \
          "$BORE_SHA256_WINDOWS_X64" /tmp/bore.zip
        unzip -qo /tmp/bore.zip -d /tmp && rm /tmp/bore.zip

        /tmp/bore.exe local 22 --to bore.pub > /tmp/bore.log 2>&1 &
        sleep 5

        BORE_PORT=$(grep -o 'bore\.pub:[0-9]*' /tmp/bore.log | cut -d: -f2 | head -1 || true)
        if [ -z "$BORE_PORT" ]; then
          echo "::warning::bore tunnel failed — continuing without SSH"
          cat /tmp/bore.log; exit 0
        fi

        SSH_CMD="ssh -p $BORE_PORT -o StrictHostKeyChecking=no runneradmin@bore.pub"
        echo "::notice::$SSH_CMD"
        echo "## SSH Connection (Windows)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$SSH_CMD" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        mkdir -p /tmp/ssh-info
        echo "$SSH_CMD" > /tmp/ssh-info/connect.txt
        echo "$BORE_PORT" > /tmp/ssh-info/port.txt

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ssh-info-${{ runner.os }}
        path: /tmp/ssh-info/
        if-no-files-found: ignore

name: Make Target
description: >
  Orchestrator. Provisions capabilities then runs a make target.
  Each capability is an independent action under capabilities/.
  This file is a flat list of conditional capability calls — zero
  logic of its own.

inputs:
  make-target:
    description: "Makefile target to run"
    required: true
  rust:
    description: "Install the Rust toolchain (off for Dart-only static jobs)"
    required: false
    default: 'true'
  free-disk:
    description: "Reclaim disk for build-heavy jobs (Linux)"
    required: false
    default: 'false'
  java:
    description: "Install JDK"
    required: false
    default: 'false'
  chrome:
    description: "Install Chrome + ChromeDriver"
    required: false
    default: 'false'
  headless-display:
    description: "Virtual display for headless GUI"
    required: false
    default: 'false'
  hw-accel:
    description: "Hardware acceleration for emulators"
    required: false
    default: 'false'
  gradle-cache:
    description: "Cache Gradle"
    required: false
    default: 'false'
  xcode-cache:
    description: "Cache Xcode derived data"
    required: false
    default: 'false'
  xcode-cache-target:
    description: "ios or macos — Xcode cache key"
    required: false
    default: ''
  pods-cache:
    description: "Cache CocoaPods"
    required: false
    default: 'false'
  wasm-cache:
    description: "Cache WASM build"
    required: false
    default: 'false'
  wasm-build:
    description: "Compile WASM from source"
    required: false
    default: 'false'
  emulator:
    description: "Boot Android emulator (wraps make-target)"
    required: false
    default: 'false'
  simulator:
    description: "Boot iOS simulator"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # ── Always ──
    - uses: ./.github/actions/capabilities/fvm

    # ── On demand ──
    # Default on: most jobs build the native/wasm engine. Dart-only static
    # jobs (pana, downgrade-analyze) never invoke cargo, so they pass rust: false.
    - uses: ./.github/actions/capabilities/rust
      if: inputs.rust == 'true'

    - uses: ./.github/actions/capabilities/free-disk-space
      if: inputs.free-disk == 'true'

    - uses: ./.github/actions/capabilities/java
      if: inputs.java == 'true'

    - uses: ./.github/actions/capabilities/chrome
      if: inputs.chrome == 'true'

    - uses: ./.github/actions/capabilities/headless-display
      if: inputs.headless-display == 'true'

    - uses: ./.github/actions/capabilities/hw-accel
      if: inputs.hw-accel == 'true'

    - uses: ./.github/actions/capabilities/gradle-cache
      if: inputs.gradle-cache == 'true'
      with:
        phase: restore

    - uses: ./.github/actions/capabilities/xcode-cache
      if: inputs.xcode-cache == 'true'
      with:
        target: ${{ inputs.xcode-cache-target }}

    - uses: ./.github/actions/capabilities/pods-cache
      if: inputs.pods-cache == 'true'

    - uses: ./.github/actions/capabilities/wasm-cache
      if: inputs.wasm-cache == 'true'

    - uses: ./.github/actions/capabilities/wasm-build
      if: inputs.wasm-build == 'true'

    - uses: ./.github/actions/capabilities/ios-simulator
      if: inputs.simulator == 'true'

    # ── Run ──
    # The run command is authored ONCE, here, into /tmp/make-run.sh:
    # `flutter doctor -v` immediately before `make <target>`. Both the
    # direct path and the emulator path execute this same file, so the
    # two can never drift — doctor always runs against the fully-
    # provisioned environment (live emulator on Android, host elsewhere)
    # on the line right before make.
    - name: Compose run script
      shell: bash
      run: |
        cat > /tmp/make-run.sh << 'EOF'
        #!/usr/bin/env bash
        set -uo pipefail
        echo "::group::flutter doctor -v"
        fvm flutter doctor -v || true
        echo "::endgroup::"
        make "$1"
        EOF
        chmod +x /tmp/make-run.sh

    # Direct path — normal and headless merged; xvfb-run is the only
    # variable (a display prefix), applied to doctor + make alike.
    - name: ${{ inputs.make-target }}
      if: inputs.emulator != 'true'
      shell: bash
      run: |
        PREFIX=""
        [ "${INPUTS_HEADLESS_DISPLAY}" = "true" ] && PREFIX="xvfb-run "
        ${PREFIX}/tmp/make-run.sh "${INPUTS_MAKE_TARGET}"
      env:
        INPUTS_HEADLESS_DISPLAY: ${{ inputs.headless-display }}
        INPUTS_MAKE_TARGET: ${{ inputs.make-target }}

    # Emulator path — the SAME script, executed inside the live emulator
    # by the capability's teardown-watchdog wrapper.
    - uses: ./.github/actions/capabilities/android-emulator
      if: inputs.emulator == 'true'
      with:
        script: /tmp/make-run.sh "${{ inputs.make-target }}"

    - uses: ./.github/actions/capabilities/gradle-cache
      if: always() && inputs.gradle-cache == 'true'
      with:
        phase: save


name: Make Target
description: >
  Orchestrator. Provisions capabilities then runs a make target.
  Each capability is an independent action under actions/capabilities/.
  This file is a flat list of conditional capability calls — zero
  logic of its own.

  Internal refs say @main here; whuppi/ci's self-release stamps them to the
  release tag in each release commit, so a consumer calling this action
  @vX.Y.Z gets capability refs that also say @vX.Y.Z. Never hand-write a
  version tag into a ref below.

inputs:
  make-target:
    description: "Makefile target to run"
    required: true
  free-disk:
    description: "Reclaim disk for build-heavy jobs (Linux)"
    required: false
    default: 'false'
  java:
    description: "Install JDK"
    required: false
    default: 'false'
  chrome:
    description: "Install Chrome + ChromeDriver"
    required: false
    default: 'false'
  headless-display:
    description: "Virtual display for headless GUI"
    required: false
    default: 'false'
  hw-accel:
    description: "Hardware acceleration for emulators"
    required: false
    default: 'false'
  gradle-cache:
    description: "Cache Gradle"
    required: false
    default: 'false'
  xcode-cache:
    description: "Cache Xcode derived data"
    required: false
    default: 'false'
  xcode-cache-target:
    description: "ios or macos — Xcode cache key"
    required: false
    default: ''
  xcode-key-extra:
    description: "Optional extra Xcode cache-key segment (forwarded to xcode-cache)"
    required: false
    default: ''
  pods-cache:
    description: "Cache CocoaPods"
    required: false
    default: 'false'
  emulator:
    description: "Boot Android emulator (wraps make-target)"
    required: false
    default: 'false'
  report-json:
    description: "Android machine JSON report path (forwarded to android-emulator)"
    required: false
    default: 'test-results/int-android.json'
  simulator:
    description: "Boot iOS simulator"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # ── Always ──
    - uses: whuppi/ci/actions/capabilities/fvm@v2.1.0

    # ── On demand ──
    - uses: whuppi/ci/actions/capabilities/free-disk-space@v2.1.0
      if: inputs.free-disk == 'true'

    - uses: whuppi/ci/actions/capabilities/java@v2.1.0
      if: inputs.java == 'true'

    - uses: whuppi/ci/actions/capabilities/chrome@v2.1.0
      if: inputs.chrome == 'true'

    - uses: whuppi/ci/actions/capabilities/headless-display@v2.1.0
      if: inputs.headless-display == 'true'

    - uses: whuppi/ci/actions/capabilities/hw-accel@v2.1.0
      if: inputs.hw-accel == 'true'

    - uses: whuppi/ci/actions/capabilities/gradle-cache@v2.1.0
      if: inputs.gradle-cache == 'true'
      with:
        phase: restore

    - uses: whuppi/ci/actions/capabilities/xcode-cache@v2.1.0
      if: inputs.xcode-cache == 'true'
      with:
        target: ${{ inputs.xcode-cache-target }}
        key-extra: ${{ inputs.xcode-key-extra }}

    - uses: whuppi/ci/actions/capabilities/pods-cache@v2.1.0
      if: inputs.pods-cache == 'true'

    - uses: whuppi/ci/actions/capabilities/ios-simulator@v2.1.0
      if: inputs.simulator == 'true'

    # ── Run ──
    # The run command is authored ONCE, here, into /tmp/make-run.sh:
    # `flutter doctor -v` immediately before `make <target>`. Both the
    # direct path and the emulator path execute this same file, so the
    # two can never drift — doctor always runs against the fully-
    # provisioned environment (live emulator on Android, host elsewhere)
    # on the line right before make.
    - name: Compose run script
      shell: bash
      run: |
        cat > /tmp/make-run.sh << 'EOF'
        #!/usr/bin/env bash
        set -uo pipefail
        echo "::group::flutter doctor -v"
        fvm flutter doctor -v || true
        echo "::endgroup::"
        make "$1"
        EOF
        chmod +x /tmp/make-run.sh

    # Direct path — normal and headless merged; xvfb-run is the only
    # variable (a display prefix), applied to doctor + make alike.
    - name: ${{ inputs.make-target }}
      if: inputs.emulator != 'true'
      shell: bash
      run: |
        PREFIX=""
        [ "${INPUTS_HEADLESS_DISPLAY}" = "true" ] && PREFIX="xvfb-run "
        ${PREFIX}/tmp/make-run.sh "${INPUTS_MAKE_TARGET}"
      env:
        INPUTS_HEADLESS_DISPLAY: ${{ inputs.headless-display }}
        INPUTS_MAKE_TARGET: ${{ inputs.make-target }}

    # Emulator path — the SAME script, executed inside the live emulator
    # by the capability's teardown-watchdog wrapper.
    - uses: whuppi/ci/actions/capabilities/android-emulator@v2.1.0
      if: inputs.emulator == 'true'
      with:
        script: /tmp/make-run.sh "${{ inputs.make-target }}"
        report-json: ${{ inputs.report-json }}

    - uses: whuppi/ci/actions/capabilities/gradle-cache@v2.1.0
      if: always() && inputs.gradle-cache == 'true'
      with:
        phase: save

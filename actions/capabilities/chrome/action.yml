name: Chrome
description: >
  Install pinned, hash-verified Chrome + ChromeDriver from Chrome for Testing.
  Linux: apt remove old + install to /opt. macOS: install to /Applications.
  Windows: install to RUNNER_TEMP. Version + per-platform sha256 live in this
  repo's tool/versions.env (read via GITHUB_ACTION_PATH); upgrade.sh re-bumps
  on Chrome's ~4-week Stable cadence.

runs:
  using: composite
  steps:
    - name: Chrome (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        CI_ROOT="$GITHUB_ACTION_PATH/../../.."
        source "$CI_ROOT/tool/versions.env"
        base="https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64"
        echo "Chrome for Testing: $CHROME_VERSION (pinned, verified)"
        INSTALL_DIR="/opt/chrome-for-testing"
        sudo mkdir -p "$INSTALL_DIR"
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chrome-linux64.zip" "$CHROME_SHA256_LINUX_X64" /tmp/chrome.zip
        sudo unzip -qo /tmp/chrome.zip -d "$INSTALL_DIR" && rm /tmp/chrome.zip
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chromedriver-linux64.zip" "$CHROMEDRIVER_SHA256_LINUX_X64" /tmp/chromedriver.zip
        sudo unzip -qo /tmp/chromedriver.zip -d "$INSTALL_DIR" && rm /tmp/chromedriver.zip
        sudo chmod +x "$INSTALL_DIR/chrome-linux64/chrome" "$INSTALL_DIR/chromedriver-linux64/chromedriver"
        sudo apt-get remove -y google-chrome-stable 2>/dev/null || true
        sudo dpkg --purge google-chrome-stable 2>/dev/null || true
        sudo ln -sf "$INSTALL_DIR/chrome-linux64/chrome" /usr/bin/google-chrome-stable
        sudo ln -sf "$INSTALL_DIR/chrome-linux64/chrome" /usr/bin/google-chrome
        sudo mkdir -p /opt/google/chrome
        sudo ln -sf "$INSTALL_DIR/chrome-linux64/chrome" /opt/google/chrome/chrome
        sudo ln -sf "$INSTALL_DIR/chromedriver-linux64/chromedriver" /usr/local/bin/chromedriver

    - name: Chrome (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        CI_ROOT="$GITHUB_ACTION_PATH/../../.."
        source "$CI_ROOT/tool/versions.env"
        base="https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/mac-arm64"
        echo "Chrome for Testing: $CHROME_VERSION (pinned, verified)"
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chrome-mac-arm64.zip" "$CHROME_SHA256_MACOS_ARM64" /tmp/chrome.zip
        unzip -qo /tmp/chrome.zip -d /tmp/chrome-install && rm /tmp/chrome.zip
        sudo rm -rf "/Applications/Google Chrome for Testing.app"
        sudo mv "/tmp/chrome-install/chrome-mac-arm64/Google Chrome for Testing.app" "/Applications/Google Chrome for Testing.app"
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chromedriver-mac-arm64.zip" "$CHROMEDRIVER_SHA256_MACOS_ARM64" /tmp/chromedriver.zip
        unzip -qo /tmp/chromedriver.zip -d /tmp/driver-install && rm /tmp/chromedriver.zip
        sudo mv /tmp/driver-install/chromedriver-mac-arm64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        echo "CHROME_EXECUTABLE=/Applications/Google Chrome for Testing.app/Contents/MacOS/Google Chrome for Testing" >> "$GITHUB_ENV"

    - name: Chrome (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        CI_ROOT="$GITHUB_ACTION_PATH/../../.."
        source "$CI_ROOT/tool/versions.env"
        base="https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/win64"
        echo "Chrome for Testing: $CHROME_VERSION (pinned, verified)"
        INSTALL_DIR="$RUNNER_TEMP/chrome-for-testing"
        mkdir -p "$INSTALL_DIR"
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chrome-win64.zip" "$CHROME_SHA256_WINDOWS_X64" "$RUNNER_TEMP/chrome.zip"
        unzip -qo "$RUNNER_TEMP/chrome.zip" -d "$INSTALL_DIR" && rm "$RUNNER_TEMP/chrome.zip"
        bash "$CI_ROOT/tool/fetch_verified.sh" "$base/chromedriver-win64.zip" "$CHROMEDRIVER_SHA256_WINDOWS_X64" "$RUNNER_TEMP/chromedriver.zip"
        unzip -qo "$RUNNER_TEMP/chromedriver.zip" -d "$INSTALL_DIR" && rm "$RUNNER_TEMP/chromedriver.zip"
        # dart test and ChromeDriver look for Chrome at hardcoded paths.
        # Copy entire Chrome for Testing directory (not just exe — Chrome
        # needs its DLLs, resources, locales to launch).
        for dir in \
          "$LOCALAPPDATA/Google/Chrome/Application" \
          "/c/Program Files/Google/Chrome/Application"; do
          rm -rf "$dir"
          mkdir -p "$dir"
          cp -r "$INSTALL_DIR/chrome-win64/"* "$dir/"
          cp "$INSTALL_DIR/chromedriver-win64/chromedriver.exe" "$dir/"
        done
        # PATH gets the standard, literal install dir — chromedriver now
        # sits beside chrome.exe there. No runner-derived value reaches
        # GITHUB_PATH, so a stray newline can't inject a shadow directory.
        echo "C:\Program Files\Google\Chrome\Application" >> "$GITHUB_PATH"
        # Heredoc with a random delimiter: a newline in the runner-provided
        # path can't break out to inject extra env entries.
        {
          echo "CHROME_EXECUTABLE<<__CFT_ENV__"
          echo "$LOCALAPPDATA/Google/Chrome/Application/chrome.exe"
          echo "__CFT_ENV__"
        } >> "$GITHUB_ENV"

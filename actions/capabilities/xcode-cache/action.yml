name: Xcode Cache
description: Cache Xcode derived data for Apple builds.

inputs:
  target:
    description: "ios or macos — used in cache key"
    required: true
  key-extra:
    description: "Optional extra cache-key segment (e.g. a dependency revision)"
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: irgaly/xcode-cache@4141f139f00e335c6e1031fb93e667181f86146f # v1.9.2
      with:
        key: xcode-${{ runner.os }}-${{ runner.arch }}-${{ inputs.target }}-${{ inputs.key-extra }}
        restore-keys: xcode-${{ runner.os }}-${{ runner.arch }}-${{ inputs.target }}-

name: iOS Simulator
description: >
  Boot iOS simulator.
  macOS: boots via simulator-action. Linux/Windows: not supported (requires Xcode).

inputs:
  model:
    description: "Simulator device model"
    required: false
    default: 'iPhone 16'

runs:
  using: composite
  steps:
    - uses: futureware-tech/simulator-action@e89aa8f93d3aec35083ff49d2854d07f7186f7f5 # v5
      with:
        model: ${{ inputs.model }}

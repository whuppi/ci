name: Android Emulator
description: >
  Boot Android emulator and run a script inside it.

  aosp_atd (Automated Test Device) — stripped-down CI image, no
  Google Play, minimal UI, fast boot. x86_64 on all runners.
  Linux: KVM. macOS Intel: HAXM/HVF. Windows: WHPX.
  macOS ARM (M1): cannot run emulators (no nested virtualization).

  AVD snapshot caching: first run cold-boots and saves a snapshot.
  Subsequent runs warm-boot from the cached snapshot (~30s vs ~5min).
  The snapshot is clean OS state — no app data. Apps install fresh.
  Disable with avd-cache: false. Force cold boot with cold-boot: true.

  Teardown watchdog: on SwiftShader emulators (macOS Intel), Flutter's
  teardown hangs because the CPU-starved guest can't be reached. Two
  sibling causes — adb stopApp()/uninstallApp() blocking on Binder IPC,
  and DDS shutdown() being fire-and-forget with no timeout. The watchdog
  kills both so flutter test exits cleanly. Harmless on hardware-accel
  runners.
    adb side: https://github.com/flutter/flutter/issues/187785
    dds side: https://github.com/flutter/flutter/issues/187984

inputs:
  script:
    description: >
      Command to run while the emulator is alive. The caller (make-target)
      passes the shared /tmp/make-run.sh so the in-emulator run is byte-
      identical to the direct path — no drift. Wrapped by the teardown
      watchdog below.
    required: true
  api-level:
    description: "Android API level (30 is lightest ATD available)"
    required: false
    default: '30'
  avd-cache:
    description: "Cache AVD snapshot for warm boot (~30s vs ~5min cold)"
    required: false
    default: 'true'
  cold-boot:
    description: "Force cold boot even when snapshot cache exists"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # ── adb ──
    - name: Start adb server
      shell: bash
      run: |
        $ANDROID_HOME/platform-tools/adb start-server
        $ANDROID_HOME/platform-tools/adb devices

    # ── AVD snapshot cache ──
    # Include emulator version in cache key — runner image updates
    # change the emulator binary, making old snapshots incompatible.
    - name: Emulator version
      id: emu-ver
      shell: bash
      run: |
        EMU="$ANDROID_HOME/emulator/emulator"
        if [ -f "$EMU" ]; then
          VER=$("$EMU" -version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
        else
          VER="not-installed"
        fi
        echo "version=$VER" >> $GITHUB_OUTPUT
        echo "Emulator version: $VER"

    - name: Restore AVD cache
      if: inputs.avd-cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-${{ runner.os }}-${{ runner.arch }}-${{ inputs.api-level }}-emu${{ steps.emu-ver.outputs.version }}

    # ── Snapshot generation (cache miss only) ──
    - name: Generate AVD snapshot (Linux/macOS)
      if: >-
        runner.os != 'Windows' &&
        inputs.avd-cache == 'true' &&
        steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
      with:
        api-level: ${{ inputs.api-level }}
        arch: x86_64
        target: aosp_atd
        force-avd-creation: false
        emulator-options: -no-window -noaudio -no-boot-anim
        emulator-boot-timeout: 600
        disable-animations: false
        script: echo "AVD snapshot generated for caching."

    - name: Generate AVD snapshot (Windows)
      if: >-
        runner.os == 'Windows' &&
        inputs.avd-cache == 'true' &&
        steps.avd-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        SDK="$(cygpath "$ANDROID_HOME")"
        SDKMGR="$(find "$SDK/cmdline-tools" -name "sdkmanager*" -type f | head -1)"
        yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true
        "$SDKMGR" \
          "system-images;android-${INPUTS_API_LEVEL};aosp_atd;x86_64" \
          "platform-tools" "emulator" > /dev/null
        AVDMGR="$(find "$SDK/cmdline-tools" -name "avdmanager*" -type f | head -1)"
        echo no | "$AVDMGR" create avd --force -n test \
          --package "system-images;android-${INPUTS_API_LEVEL};aosp_atd;x86_64"
        "$SDK/emulator/emulator" -port 5554 -avd test \
          -no-window -noaudio -no-boot-anim &
        TIMEOUT=600; ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          RESULT=$("$SDK/platform-tools/adb" -s emulator-5554 \
            shell getprop sys.boot_completed 2>/dev/null || true)
          [ "$RESULT" = "1" ] && echo "Booted in ${ELAPSED}s." && break
          sleep 2; ELAPSED=$((ELAPSED + 2))
        done
        "$SDK/platform-tools/adb" -s emulator-5554 emu kill || true
        sleep 5
      env:
        INPUTS_API_LEVEL: ${{ inputs.api-level }}

    # ── Teardown watchdog wrapper ──
    # Written to /tmp and passed as the reactivecircus script.
    # Runs the user's command in background, monitors for stuck adb
    # teardown commands, kills them if found.
    - name: Write teardown watchdog
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cat > /tmp/emulator-run.sh << 'EMUSCRIPT'
        #!/usr/bin/env bash
        # NOT -e: the result reconciler at the end must run even when the
        # command exits non-zero.
        set -uo pipefail

        OUT=/tmp/emulator-cmd.log
        : > "$OUT"

        # Run the command in the background, appending to a log (plain redirect
        # keeps $! = the command and $? = its real exit code, unlike a tee pipe).
        # Append-mode so the watchdog below shares this log without clobbering:
        # both writers seek to EOF atomically, and the command writes a final
        # tally AFTER the watchdog's kill line. A separate tail streams the log
        # live to the console so CI output is unchanged.
        bash -c "$1" >> "$OUT" 2>&1 &
        CMD_PID=$!
        tail -f "$OUT" 2>/dev/null &
        TAIL_PID=$!

        # Teardown watchdog. On CPU-starved CI emulators (macOS-Intel
        # SwiftShader) flutter test's teardown hangs and never exits:
        #   - adb force-stop / uninstall block on Binder IPC
        #     (flutter#187785; #187876 added adb timeouts on master, not
        #     yet on stable), and
        #   - DDS shutdown is fire-and-forget with no timeout so the dart
        #     development-service lingers (flutter#187984, the issue we
        #     filed for this exact hang).
        # Kill the stuck teardown
        # processes so the run can finish; the result reconciler below
        # decides pass/fail from the actual test output, not the exit
        # code the kill leaves behind.
        # pgrep -f "a|b" doesn't work on macOS — search separately.
        # adb force-stop / uninstall: kill on sight — these processes only
        # ever exist during teardown, so matching one always means a hang.
        kill_match() {
          for pid in $(pgrep -f "$1" 2>/dev/null); do
            local cmd; cmd=$(ps -p "$pid" -o args= 2>/dev/null || true)
            grep -q "$2" <<< "$cmd" || continue
            echo "=== WATCHDOG: killing stuck $1 (PID $pid) to unblock teardown ==="
            kill -9 "$pid" 2>/dev/null || true
          done
        }
        # DDS runs for the WHOLE test session, so it must NOT be killed by
        # name alone — that crashes the live DDS mid-run
        # (VmServiceDisappearedException). Kill it ONLY in the exact
        # frozen-teardown signature: a dartvm whose SOLE child is the DDS
        # process AND it's idle at ~0% CPU. During the run dartvm has
        # other children (app, adb) and DDS is busy, so this can't fire
        # mid-test — it's self-gating, no text marker needed.
        #
        # Killing DDS can sever the harness tally after tests ran but before
        # they were counted, so the "N passed" summary and the exit code both
        # undercount (fire-and-forget DDS shutdown, flutter#187984).
        kill_stuck_dds() {
          for dvmpid in $(pgrep -f dartvm 2>/dev/null); do
            local kids; kids=$(pgrep -P "$dvmpid" 2>/dev/null)
            [ "$(grep -c . <<< "$kids")" -eq 1 ] || continue
            ps -p "$kids" -o args= 2>/dev/null | grep -q development-service || continue
            local cpu; cpu=$(ps -p "$kids" -o %cpu= 2>/dev/null | tr -d ' ')
            echo "${cpu:-1}" | awk '{ exit ($1 > 0.5) }' || continue
            echo "=== WATCHDOG: stuck DDS at teardown (PID $kids, cpu=${cpu}%)."
            echo "    Sole idle dartvm child = dispose() hung on DDS. Killing. ==="
            kill -9 "$kids" 2>/dev/null || true
          done
        }
        # Append the watchdog's "WATCHDOG:" kill lines to the same log (EOF-atomic,
        # no clobber). They stream live via the tail, and the reconciler reads
        # them from $OUT to tell a watchdog-severed suite teardown from a real one.
        (
          while kill -0 $CMD_PID 2>/dev/null; do
            sleep 30
            kill_match force-stop adb
            kill_match uninstall adb
            kill_stuck_dds
          done
        ) >> "$OUT" 2>&1 &
        WATCHDOG_PID=$!

        wait $CMD_PID 2>/dev/null
        EXIT=$?

        kill $WATCHDOG_PID 2>/dev/null || true
        wait $WATCHDOG_PID 2>/dev/null || true
        # Flush the tail, then stop it.
        sleep 1
        kill $TAIL_PID 2>/dev/null || true
        wait $TAIL_PID 2>/dev/null || true

        # The watchdog kill -9s a DDS that dispose() hung on at teardown, which
        # dirties the exit code even on a clean pass AND marks those tests
        # result:"error" — the teardown failed, not the test (flutter#187984/
        # #187785). So neither the exit code nor the JSON result alone is
        # trusted. The reconciler reads the JSON for structure but takes the
        # captured console ($OUT) too: a test whose body printed its pass mark
        # counts as passed even when its teardown was killed, and the suite
        # (tearDownAll) step — which has no body to mark — is treated as severed
        # by the watchdog (its "WATCHDOG:" line is in $OUT) rather than a real
        # failure. A body that never passed still fails. Android is the only
        # surface that needs this — the SwiftShader emulator (macOS-Intel) is
        # where the teardown hangs; everything else trusts its plain exit code.
        echo ""
        echo "raw command exit was $EXIT (ignored — reconciling from the JSON report)"
        WS="${GITHUB_WORKSPACE:-.}"
        bash "$WS/tool/ci/reconcile_test_json.sh" "$WS/test-results/int-android.json" "$OUT"
        exit $?
        EMUSCRIPT
        chmod +x /tmp/emulator-run.sh

    # ── Boot + run ──
    # -no-snapshot-save: warm-boot from cached snapshot, don't save
    #   post-test state back. clean slate every run.
    # -no-snapshot: cold-boot, ignore snapshot entirely (cold-boot input).
    - name: Boot + run (Linux/macOS)
      if: runner.os != 'Windows'
      uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
      with:
        api-level: ${{ inputs.api-level }}
        arch: x86_64
        target: aosp_atd
        force-avd-creation: false
        emulator-options: >-
          ${{ inputs.cold-boot == 'true' && '-no-snapshot' || '-no-snapshot-save' }}
          -no-window -noaudio -no-boot-anim
        emulator-boot-timeout: 600
        disable-animations: true
        script: /tmp/emulator-run.sh '${{ inputs.script }}'

    # ── Windows: mirrors reactivecircus action 1:1 ──
    # The action doesn't support Windows, so we replicate its exact
    # sequence: always install SDK, conditionally create AVD, boot,
    # disable animations, run script, kill.
    # Source: ReactiveCircus/android-emulator-runner v2
    #   sdk-installer.ts → installAndroidSdk() — always runs
    #   emulator-manager.ts → createAvd() — skips if AVD exists
    #   emulator-manager.ts → launchEmulator() — boot + poll

    # Step 1: Install SDK (always — matches action's installAndroidSdk)
    - name: Install SDK (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        SDK="$(cygpath "$ANDROID_HOME")"
        SDKMGR="$(find "$SDK/cmdline-tools" -name "sdkmanager*" -type f | head -1)"
        yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true
        "$SDKMGR" --install \
          "build-tools;36.0.0" \
          "platform-tools" \
          "platforms;android-${INPUTS_API_LEVEL}" \
          "emulator" \
          "system-images;android-${INPUTS_API_LEVEL};aosp_atd;x86_64" > /dev/null
      env:
        INPUTS_API_LEVEL: ${{ inputs.api-level }}

    # Step 2: Create AVD + boot + disable animations + run + kill
    - name: Boot + run (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        SDK="$(cygpath "$ANDROID_HOME")"

        # Create AVD if it doesn't exist (matches action's createAvd
        # with force-avd-creation: false — checks avd directory).
        AVD_DIR="$HOME/.android/avd/test.avd"
        if [ ! -d "$AVD_DIR" ]; then
          AVDMGR="$(find "$SDK/cmdline-tools" -name "avdmanager*" -type f | head -1)"
          echo no | "$AVDMGR" create avd --force -n test \
            --package "system-images;android-${INPUTS_API_LEVEL};aosp_atd;x86_64"
        fi

        ADB="$SDK/platform-tools/adb -s emulator-5554"

        # Boot emulator (matches action's launchEmulator).
        if [ "$INPUTS_COLD_BOOT" = "true" ]; then
          SNAP_FLAG="-no-snapshot"
        else
          SNAP_FLAG="-no-snapshot-save"
        fi
        "$SDK/emulator/emulator" -port 5554 -avd test \
          $SNAP_FLAG -no-window -noaudio -no-boot-anim &

        # Poll for boot (matches action's adb wait loop).
        TIMEOUT=600; ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          RESULT=$($ADB shell getprop sys.boot_completed 2>/dev/null || true)
          if [ "$RESULT" = "1" ]; then
            echo "Emulator booted in ${ELAPSED}s."
            break
          fi
          sleep 2; ELAPSED=$((ELAPSED + 2))
        done
        [ "$RESULT" != "1" ] && echo "::error::Emulator boot timeout" && exit 1

        # sys.boot_completed flips when the kernel is up, but system
        # services (input, settings) publish to ServiceManager a moment
        # later. Sending input/settings commands before then fails with
        # "Can't find service" and aborts the job (reactivecircus#432).
        # Wait for each service to actually exist first.
        wait_for_service() {
          local svc="$1" tries=0
          until $ADB shell service check "$svc" 2>/dev/null | grep -q "Service $svc:"; do
            tries=$((tries + 1))
            [ "$tries" -gt 60 ] && echo "::warning::service '$svc' never published" && return 0
            sleep 1
          done
        }

        # Disable animations (matches action's disableAnimations).
        wait_for_service input
        $ADB shell input keyevent 82
        wait_for_service settings
        $ADB shell settings put global window_animation_scale 0.0
        $ADB shell settings put global transition_animation_scale 0.0
        $ADB shell settings put global animator_duration_scale 0.0

        # Run the user's script through bash -c so the string is parsed as a
        # command (mirrors the Linux/macOS emulator-run.sh path). An unquoted
        # ${INPUTS_SCRIPT} would word-split but leave any quote chars literal,
        # so a quoted make target would reach make with the quotes attached.
        bash -c "$INPUTS_SCRIPT"
      env:
        INPUTS_API_LEVEL: ${{ inputs.api-level }}
        INPUTS_SCRIPT: ${{ inputs.script }}
        INPUTS_COLD_BOOT: ${{ inputs.cold-boot }}

    # ── Cleanup ──
    - name: Kill emulator (Windows)
      if: always() && runner.os == 'Windows'
      shell: bash
      run: |
        SDK="$(cygpath "$ANDROID_HOME")"
        "$SDK/platform-tools/adb" -s emulator-5554 emu kill || true

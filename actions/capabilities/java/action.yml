name: Java
description: Install JDK for Android builds.

inputs:
  version:
    description: "JDK version"
    required: false
    default: '17'

runs:
  using: composite
  steps:
    - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: temurin
        java-version: ${{ inputs.version }}

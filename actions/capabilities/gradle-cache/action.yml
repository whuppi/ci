name: Gradle Cache
description: >
  Cache Gradle downloads for Android builds.
  Two-phase: restore runs as a pre-step, save runs as a post-step
  with daemon stop to release Windows file locks.

inputs:
  phase:
    description: "'restore' before build, 'save' after build"
    required: true

runs:
  using: composite
  steps:
    - name: Restore Gradle cache
      if: inputs.phase == 'restore'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('example/android/build.gradle.kts', 'example/android/app/build.gradle.kts') }}
        restore-keys: gradle-${{ runner.os }}-${{ runner.arch }}-

    - name: Stop Gradle daemon
      if: inputs.phase == 'save'
      continue-on-error: true
      shell: bash
      run: cd example/android && ./gradlew --stop 2>/dev/null || true

    - name: Save Gradle cache
      if: inputs.phase == 'save'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      continue-on-error: true
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('example/android/build.gradle.kts', 'example/android/app/build.gradle.kts') }}

name: Release Tool
description: >
  Run the shared release.sh (from this action's own whuppi/ci copy) in the
  consumer's working directory. Preferred over checking whuppi/ci out into the
  workspace: the ref is Dependabot-bumpable like any action, and the script
  runs from the runner's action cache, so nothing shared can leak into the
  consumer's stamped release tree or pub tarball.

  Env contract (set on the calling step): BRANCH for --check-versions /
  --gate / --discover; BEFORE + AFTER for --gate; GH_TOKEN for every mode
  that talks to GitHub. GITHUB_REPOSITORY is set by the runner. A consumer
  tool/ci/release_hooks.sh (resolved against the working directory) extends
  asset hashing — see release.sh's header.

inputs:
  mode:
    description: "release.sh mode (e.g. --gate, --discover, --stamp-changelog)"
    required: true
  tag:
    description: "Tag argument for the modes that take one (e.g. v1.2.3)"
    required: false
    default: ''

# Composite actions don't forward inner-step outputs on their own — without
# this mapping, everything release.sh writes to $GITHUB_OUTPUT dies inside
# the action and the caller's `steps.<id>.outputs.*` reads come back empty.
# Modes that don't emit a given key leave that output empty.
outputs:
  should_run:
    description: "--gate: 'true' when the changelog gained a new top version"
    value: ${{ steps.run.outputs.should_run }}
  version:
    description: "--gate / --discover: the version the changelog names"
    value: ${{ steps.run.outputs.version }}
  tag:
    description: "--discover: the created release tag (e.g. v1.2.3)"
    value: ${{ steps.run.outputs.tag }}
  has_release:
    description: "--discover: 'true' when a release was found or created"
    value: ${{ steps.run.outputs.has_release }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        INPUTS_MODE: ${{ inputs.mode }}
        INPUTS_TAG: ${{ inputs.tag }}
      run: |
        CI_ROOT="$GITHUB_ACTION_PATH/../.."
        if [ -n "$INPUTS_TAG" ]; then
          bash "$CI_ROOT/tool/ci/release.sh" "$INPUTS_MODE" "$INPUTS_TAG"
        else
          bash "$CI_ROOT/tool/ci/release.sh" "$INPUTS_MODE"
        fi
